<!DOCTYPE html>
<html>
<head>
    <title>Ripples Auto-Joiner Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #fff 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .sub { color: #888; margin-bottom: 32px; font-size: 14px; }
        label { color: #ccc; font-size: 14px; font-weight: 500; display: block; margin-bottom: 8px; }
        input, select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; }
        .result {
            margin-top: 32px;
            background: #0a0a0a;
            border-radius: 16px;
            padding: 20px;
        }
        .loadstring {
            background: #000;
            padding: 16px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #4ade80;
            word-break: break-all;
            margin-bottom: 16px;
            max-height: 300px;
            overflow: auto;
            white-space: pre-wrap;
        }
        .copy-btn {
            background: #2a2a3e;
            padding: 10px;
            width: auto;
        }
        .status {
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 13px;
        }
        .status.loading { background: rgba(168,85,247,0.2); color: #a855f7; }
        .status.success { background: rgba(74,222,128,0.2); color: #4ade80; }
        .status.error { background: rgba(239,68,68,0.2); color: #ef4444; }
        hr { margin: 20px 0; border-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>⚡ Auto-Joiner Generator</h1>
            <div class="sub">Generate your own auto-joiner script</div>
            
            <label>📡 Your Discord Webhook URL</label>
            <input type="url" id="webhook" placeholder="https://discord.com/api/webhooks/...">
            
            <label>🎮 Target Game ID</label>
            <select id="gameId">
                <option value="142823291">Murder Mystery 2 (142823291)</option>
                <option value="2753915549">Blox Fruits (2753915549)</option>
                <option value="3956818381">Adopt Me! (3956818381)</option>
            </select>
            
            <label>👤 Your Roblox Username</label>
            <input type="text" id="receiverName" placeholder="your_username">
            
            <label>⏱️ Check Interval (seconds)</label>
            <input type="number" id="interval" value="3" min="1" max="10">
            
            <button id="generateBtn">✨ Generate Auto-Joiner Script</button>
            
            <div id="result" style="display: none;">
                <div class="result">
                    <div class="loadstring" id="loadstringOutput"></div>
                    <button class="copy-btn" onclick="copyLoadstring()">📋 Copy Loadstring</button>
                    <div id="statusMsg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        generateBtn.onclick = generateLoadstring;
        
        async function generateLoadstring() {
            const webhook = document.getElementById('webhook').value;
            const gameId = document.getElementById('gameId').value;
            const receiverName = document.getElementById('receiverName').value;
            const interval = document.getElementById('interval').value;
            
            if (!webhook || !webhook.includes('discord.com/api/webhooks/')) {
                alert('Please enter a valid Discord webhook URL');
                return;
            }
            
            if (!receiverName) {
                alert('Please enter your Roblox username');
                return;
            }
            
            const btn = document.getElementById('generateBtn');
            const resultDiv = document.getElementById('result');
            const statusDiv = document.getElementById('statusMsg');
            
            btn.disabled = true;
            btn.textContent = '🔧 Generating...';
            resultDiv.style.display = 'block';
            statusDiv.innerHTML = '<div class="status loading">⏳ Creating script...</div>';
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ webhook, gameId, receiverName, interval })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('loadstringOutput').textContent = data.loadstring;
                    statusDiv.innerHTML = '<div class="status success">✅ Script generated! Copy the loadstring above.</div>';
                } else {
                    statusDiv.innerHTML = `<div class="status error">❌ Error: ${data.error}</div>`;
                }
            } catch (err) {
                statusDiv.innerHTML = `<div class="status error">❌ Failed: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '✨ Generate Auto-Joiner Script';
            }
        }
        
        function copyLoadstring() {
            const code = document.getElementById('loadstringOutput').textContent;
            navigator.clipboard.writeText(code);
            alert('✅ Loadstring copied!');
        }
    </script>
</body>
</html>
